services:
  mongo:
    image: mongo:7
    container_name: posit_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: posit_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/itcommerce
      JWT_ACCESS_SECRET: super_access_secret_change_me
      JWT_REFRESH_SECRET: super_refresh_secret_change_me
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 30d
      CORS_ORIGIN: http://localhost:3000
      POINTS_RATE: 0.05
      POINTS_TO_WALLET_RATE: 0.01
      NODE_ENV: production
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: posit_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"

volumes:
  mongo_data:
